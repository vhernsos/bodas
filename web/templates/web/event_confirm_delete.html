{% extends 'web/base.html' %}
{% block title %}Delete Event{% endblock %}
{% block content %}

<div class="delete-page">
  <div class="delete-card">
    <span class="delete-icon">⚠️</span>
    <h2 class="delete-title">Delete Event?</h2>
    <p class="delete-message">
      You are about to permanently delete<br>
      <strong style="color:var(--white);">{{ evento.nombre }}</strong><br>
      This action <strong style="color:var(--red);">cannot be undone</strong>.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="delete-actions">
        <button type="submit" class="btn btn-danger">🗑 Yes, Delete</button>
        <a href="{% url 'event_detail' evento.pk %}" class="btn btn-secondary">
          ← Keep Event
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
